name: nearmates
description: A Gen-Z focused hyperlocal discovery + dating + friendship app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  
  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  firebase_storage: ^11.6.4
  firebase_messaging: ^14.7.19
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.0.0
  
  # BLE
  flutter_blue_plus: ^1.15.10
  permission_handler: ^11.3.0
  
  # Media & Serverless
  video_player: ^2.8.2
  cached_network_image: ^3.3.1
  cloud_functions: ^4.6.0
  
  # Serialization
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
